name: "Unit Tests"

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
env:
  BRAINTREE_JS_ENV: development
  CI: true
  HOST: "localhost"
jobs:
  build-test:
    runs-on: gh-2-core-ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    env:
      BRAINTREE_JS_ENV: development
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Node Setup"
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: "Install dependencies"
        run: npm ci

      - name: "Run tests"
        run: npx jest --config=jest.config.json --ci  --reporters=summary --reporters=github-actions --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
